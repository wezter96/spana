# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      run: bun oxlint --fix {staged_files}
      stage_fixed: true
    - name: oxfmt
      run: bun oxfmt --write {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: lint
      run: bun run lint
    - name: check-types
      run: CI=1 bun run check-types
    - name: tests
      run: bun run test
